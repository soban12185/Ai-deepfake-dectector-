

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deepguard_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-super-secret}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./deepfake_detector.db}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - CORS_ORIGINS=["http://localhost","http://localhost:80","http://localhost:3000","http://localhost:5173","http://127.0.0.1","http://127.0.0.1:80"]
      - MAX_IMAGE_SIZE_MB=10
      - MAX_VIDEO_SIZE_MB=100
    volumes:
      - backend_uploads:/app/uploads
      - backend_reports:/app/reports
      - backend_models:/app/models
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: deepguard_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1

volumes:
  backend_uploads:
  backend_reports:
  backend_models:
  backend_logs:
